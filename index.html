<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5-Day Workout Plan</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #5f5e5a; margin-bottom: 1.5rem; }

  .week-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .day-btn {
    padding: 8px 14px; border-radius: 8px;
    border: 0.5px solid #b4b2a9;
    background: #fff;
    color: #1a1a18; font-size: 13px; cursor: pointer;
    transition: background 0.15s;
  }
  .day-btn:hover { background: #f1efe8; }
  .day-btn.active { border-color: #185FA5; background: #E6F1FB; color: #0C447C; font-weight: 500; }
  .day-btn.rest-btn.active { border-color: #3B6D11; background: #EAF3DE; color: #27500A; }

  .day-panel { display: none; }
  .day-panel.visible { display: block; }

  .day-header { margin-bottom: 1rem; }
  .day-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: #888780; margin-bottom: 4px; }
  .day-title { font-size: 20px; font-weight: 500; }
  .day-meta { font-size: 13px; color: #888780; margin-top: 4px; }

  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #b4b2a9; margin: 1.25rem 0 0.5rem; font-weight: 500; }

  .exercise-card {
    background: #fff;
    border: 0.5px solid #d3d1c7;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 8px;
  }
  .exercise-card:hover { border-color: #b4b2a9; }
  .ex-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .ex-name { font-size: 15px; font-weight: 500; }
  .ex-badge {
    font-size: 11px; padding: 3px 9px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; margin-top: 2px;
  }
  .badge-machine { background: #E6F1FB; color: #185FA5; }
  .badge-dumbbell { background: #EEEDFE; color: #534AB7; }
  .badge-cable { background: #FAEEDA; color: #854F0B; }
  .badge-bodyweight { background: #EAF3DE; color: #3B6D11; }
  .badge-cardio { background: #FAECE7; color: #993C1D; }

  .ex-detail { font-size: 13px; color: #5f5e5a; margin-top: 5px; }
  .ex-tip { font-size: 12px; color: #888780; margin-top: 4px; border-left: 2px solid #d3d1c7; padding-left: 8px; }

  .expand-btn { font-size: 12px; cursor: pointer; background: none; border: none; padding: 0; margin-top: 6px; color: #185FA5; }
  .tip-box { display: none; }
  .tip-box.open { display: block; }

  .note-box {
    background: #f1efe8;
    border-radius: 8px;
    padding: 0.75rem 1rem; margin-top: 1.25rem;
    font-size: 13px; color: #5f5e5a; line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">
  <h1>5-Day Workout Plan</h1>
  <p class="subtitle">3 gym days · 2 home cardio/core days · Beginner friendly · No barbell</p>
  <div class="week-nav" id="nav"></div>
  <div id="panels"></div>
</div>

<script>
const days = [
  {
    id: 0, label: "Day 1 — Gym", title: "Chest, Shoulders & Triceps",
    meta: "3 sets each · 60 min · Machine & dumbbell focus",
    type: "gym",
    sections: [
      { name: "Warm-up (5–7 min)", exercises: [
        { name: "Treadmill walk (incline 3–5%)", badge: "cardio", detail: "5–7 min at comfortable pace", tip: "Gets heart rate up and warms the joints before pressing movements." },
      ]},
      { name: "Main work", exercises: [
        { name: "Chest press machine", badge: "machine", detail: "3 sets × 10–12 reps · 60 sec rest", tip: "Adjust the seat so handles align with mid-chest. Control the weight back — don't let it slam." },
        { name: "Dumbbell incline press", badge: "dumbbell", detail: "3 sets × 10–12 reps · 60 sec rest", tip: "Set bench to ~30°. Light weight to start — focus on feel, not load." },
        { name: "Pec deck / chest fly machine", badge: "machine", detail: "3 sets × 12–15 reps · 45 sec rest", tip: "Great for stretch and squeeze — slow down the eccentric (opening phase)." },
        { name: "Dumbbell lateral raise", badge: "dumbbell", detail: "3 sets × 12–15 reps · 45 sec rest", tip: "Slight bend in elbow. Lead with elbows, not hands. Stop at shoulder height." },
        { name: "Shoulder press machine", badge: "machine", detail: "3 sets × 10–12 reps · 60 sec rest", tip: "Prefer the machine over dumbbells at first — easier to control and build confidence." },
        { name: "Cable or machine tricep pushdown", badge: "cable", detail: "3 sets × 12–15 reps · 45 sec rest", tip: "Keep elbows pinned to your sides. Squeeze at the bottom of each rep." },
      ]},
      { name: "Cooldown", exercises: [
        { name: "Chest and shoulder stretches", badge: "bodyweight", detail: "5 min static stretching", tip: "Doorframe chest stretch, cross-body shoulder pull. Hold 30 sec each." },
      ]}
    ],
    note: "Start with weights that let you finish all reps with good form. Leave 1–2 reps in the tank — you're building a base, not testing a max."
  },
  {
    id: 1, label: "Day 2 — Home", title: "Cardio + Core",
    meta: "30–40 min cardio · 15 min core · Home",
    type: "home",
    sections: [
      { name: "Cardio (30–40 min)", exercises: [
        { name: "Treadmill or bike — steady state", badge: "cardio", detail: "30–40 min at conversational pace (Zone 2)", tip: "You should be able to hold a conversation but feel like you're working. This is the fat-burning sweet spot." },
      ]},
      { name: "Core circuit (3 rounds)", exercises: [
        { name: "Dead bug", badge: "bodyweight", detail: "3 × 10 reps per side · 30 sec rest", tip: "Slow and controlled. Press lower back into the floor the entire time. Excellent low-impact core starter." },
        { name: "Glute bridge", badge: "bodyweight", detail: "3 × 15 reps · 30 sec rest", tip: "Drive through your heels. Squeeze glutes at the top. Can add a dumbbell on hips for resistance." },
        { name: "Plank hold", badge: "bodyweight", detail: "3 × 20–30 sec · 30 sec rest", tip: "Start on knees if needed. Build to full plank over the first few weeks. Quality beats duration." },
        { name: "Dumbbell Russian twist", badge: "dumbbell", detail: "3 × 10 reps per side · 30 sec rest", tip: "Light dumbbell or no weight at first. Feet can rest on the floor — no need to raise them." },
      ]}
    ],
    note: "Home day — no gym needed. Cardio burns calories and builds aerobic base; core work protects your spine and improves posture."
  },
  {
    id: 2, label: "Day 3 — Gym", title: "Back & Biceps",
    meta: "3 sets each · 60 min · Machine & dumbbell focus",
    type: "gym",
    sections: [
      { name: "Warm-up (5–7 min)", exercises: [
        { name: "Rowing machine or treadmill", badge: "cardio", detail: "5–7 min easy pace", tip: "The rowing machine is great here — warms up your back before you work it." },
      ]},
      { name: "Main work", exercises: [
        { name: "Seated cable row (wide or narrow grip)", badge: "cable", detail: "3 sets × 10–12 reps · 60 sec rest", tip: "Sit tall, pull to your navel, squeeze shoulder blades together. Don't lean back excessively." },
        { name: "Lat pulldown machine", badge: "machine", detail: "3 sets × 10–12 reps · 60 sec rest", tip: "Pull to upper chest, not behind the neck. Think about pulling your elbows down toward your hips." },
        { name: "Machine chest-supported row", badge: "machine", detail: "3 sets × 10–12 reps · 60 sec rest", tip: "Chest support eliminates lower back strain. Great for isolating mid-back." },
        { name: "Dumbbell single-arm row", badge: "dumbbell", detail: "3 sets × 10 reps per side · 60 sec rest", tip: "Use a bench for support. Let the dumbbell hang fully at the bottom each rep for a full stretch." },
        { name: "Dumbbell curl (alternating)", badge: "dumbbell", detail: "3 sets × 10–12 reps · 45 sec rest", tip: "No swinging. Keep elbows at your sides throughout. Slow it down — 2 sec up, 2 sec down." },
        { name: "Machine or cable bicep curl", badge: "machine", detail: "3 sets × 12 reps · 45 sec rest", tip: "Machines are great for isolation and consistency. Squeeze hard at the top." },
      ]},
      { name: "Cooldown", exercises: [
        { name: "Back and bicep stretches", badge: "bodyweight", detail: "5 min static stretching", tip: "Child's pose for back, overhead tricep stretch doubles as a lat opener. Hold 30 sec each." },
      ]}
    ],
    note: "Back is your largest upper body muscle group — building it improves posture and daily function significantly. Don't skip the stretching today."
  },
  {
    id: 3, label: "Day 4 — Home", title: "Cardio + Core",
    meta: "30–40 min cardio · 15 min core · Home",
    type: "home",
    sections: [
      { name: "Cardio (30–40 min)", exercises: [
        { name: "Treadmill or bike — steady state or intervals", badge: "cardio", detail: "30–40 min · Steady or try 1 min faster / 2 min easy × 10 rounds", tip: "As you get more comfortable, swap one steady-state day for intervals — much more efficient for fat loss." },
      ]},
      { name: "Core circuit (3 rounds)", exercises: [
        { name: "Bird dog", badge: "bodyweight", detail: "3 × 10 reps per side · 30 sec rest", tip: "Opposite arm and leg extend slowly. Don't let your hips rotate. Great for stability." },
        { name: "Side plank (each side)", badge: "bodyweight", detail: "3 × 20 sec per side · 30 sec rest", tip: "On your knee if needed. Hips off the floor and forward. Builds the obliques without any spine flexion." },
        { name: "Dumbbell standing oblique crunch", badge: "dumbbell", detail: "3 × 12 per side · 30 sec rest", tip: "Hold one dumbbell, dip to the side, return under control. Doesn't require you to get on the floor." },
        { name: "Reverse crunch", badge: "bodyweight", detail: "3 × 12 reps · 30 sec rest", tip: "Lying on back, knees bent. Curl hips up off floor using abs — not momentum. Lower slowly." },
      ]}
    ],
    note: "Second home day keeps the weekly calorie burn elevated without adding gym fatigue. Vary the cardio style from Day 2 when you feel ready."
  },
  {
    id: 4, label: "Day 5 — Gym", title: "Legs & Core (No Barbell)",
    meta: "3 sets each · 60 min · Machine & dumbbell focus",
    type: "gym",
    sections: [
      { name: "Warm-up (5–7 min)", exercises: [
        { name: "Stationary bike", badge: "cardio", detail: "5–7 min easy spin", tip: "Bike is the best leg-day warm-up — drives blood into quads and glutes with zero impact." },
      ]},
      { name: "Main work", exercises: [
        { name: "Leg press machine", badge: "machine", detail: "3 sets × 12–15 reps · 90 sec rest", tip: "Feet shoulder-width, mid-platform. Don't lock knees at the top. Start very light — this machine can handle ego-loading and your joints shouldn't be the ones paying for it." },
        { name: "Leg curl machine (hamstrings)", badge: "machine", detail: "3 sets × 12 reps · 60 sec rest", tip: "Seated or lying — whichever the gym has. Slow and controlled on the way back up." },
        { name: "Leg extension machine (quads)", badge: "machine", detail: "3 sets × 12–15 reps · 60 sec rest", tip: "Full extension, brief pause at top. Can feel intense — don't overload early." },
        { name: "Dumbbell Romanian deadlift", badge: "dumbbell", detail: "3 sets × 10–12 reps · 60 sec rest", tip: "Hinge at the hips, soft bend in knees, dumbbells slide down your thighs. Stop when you feel a hamstring stretch, not when your back rounds." },
        { name: "Seated calf raise", badge: "machine", detail: "3 sets × 15 reps · 45 sec rest", tip: "Full range — deep stretch at the bottom, full rise at the top. Calves respond well to high reps." },
        { name: "Abductor / adductor machine", badge: "machine", detail: "2 sets × 15 reps each · 45 sec rest", tip: "Good for hip stability and a balanced lower body look. Many people skip these — don't." },
      ]},
      { name: "Cooldown", exercises: [
        { name: "Leg and hip stretches", badge: "bodyweight", detail: "5 min static stretching", tip: "Standing quad stretch, seated hamstring stretch, hip flexor lunge hold. Your legs will thank you tomorrow." },
      ]}
    ],
    note: "No barbell or back squat here — the leg press and Romanian deadlift with dumbbells hit quads, hamstrings, and glutes effectively without loading your spine the same way."
  }
];

const badgeClass = { machine: "badge-machine", dumbbell: "badge-dumbbell", cable: "badge-cable", bodyweight: "badge-bodyweight", cardio: "badge-cardio" };
const nav = document.getElementById('nav');
const panels = document.getElementById('panels');

days.forEach((day, i) => {
  const btn = document.createElement('button');
  btn.className = 'day-btn' + (day.type === 'home' ? ' rest-btn' : '') + (i === 0 ? ' active' : '');
  btn.textContent = day.label;
  btn.onclick = () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('visible'));
    document.getElementById('panel-' + i).classList.add('visible');
  };
  nav.appendChild(btn);

  const panel = document.createElement('div');
  panel.className = 'day-panel' + (i === 0 ? ' visible' : '');
  panel.id = 'panel-' + i;

  let html = `<div class="day-header"><div class="day-label">${day.label}</div><div class="day-title">${day.title}</div><div class="day-meta">${day.meta}</div></div>`;

  day.sections.forEach(sec => {
    html += `<div class="section-label">${sec.name}</div>`;
    sec.exercises.forEach((ex, ei) => {
      const tipId = `tip-${i}-${ei}`;
      html += `<div class="exercise-card">
        <div class="ex-top">
          <div class="ex-name">${ex.name}</div>
          <span class="ex-badge ${badgeClass[ex.badge] || ''}">${ex.badge}</span>
        </div>
        <div class="ex-detail">${ex.detail}</div>
        <button class="expand-btn" onclick="toggleTip('${tipId}', this)">+ show tip</button>
        <div class="tip-box" id="${tipId}"><div class="ex-tip">${ex.tip}</div></div>
      </div>`;
    });
  });

  if (day.note) html += `<div class="note-box">${day.note}</div>`;
  panel.innerHTML = html;
  panels.appendChild(panel);
});

function toggleTip(id, btn) {
  const box = document.getElementById(id);
  box.classList.toggle('open');
  btn.textContent = box.classList.contains('open') ? '− hide tip' : '+ show tip';
}
</script>
</body>
</html>
